name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            zstd

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: npm ci

      # ── Download bundled Ollama binary ────────────────────────────────────
      - name: Download Ollama binary (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL "https://github.com/ollama/ollama/releases/latest/download/ollama-darwin.tgz" \
            -o ollama-darwin.tgz
          tar -xzf ollama-darwin.tgz
          mv ollama "src-tauri/binaries/ollama-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/ollama-${{ matrix.target }}"

      - name: Download Ollama binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile ollama.zip
          Expand-Archive -Path ollama.zip -DestinationPath ollama-extract -Force
          Copy-Item ollama-extract\ollama.exe "src-tauri\binaries\ollama-${{ matrix.target }}.exe"

      - name: Download Ollama binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL "https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst" \
            -o ollama-linux.tar.zst
          tar -xf ollama-linux.tar.zst
          # Ollama packages the binary at bin/ollama inside the tarball
          mv bin/ollama "src-tauri/binaries/ollama-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/ollama-${{ matrix.target }}"

      # ── Build word database ───────────────────────────────────────────────
      - name: Build word database
        shell: bash
        continue-on-error: true
        run: |
          python3 scripts/build-wordlist.py --output resources/wordlist.bin ||
          python scripts/build-wordlist.py --output resources/wordlist.bin ||
          echo "Word database build skipped — using fallback"

      # ── Build the Tauri app ───────────────────────────────────────────────
      # No Apple signing vars = Tauri builds an unsigned .app/.dmg automatically
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crossforge-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  # ── Create GitHub Release on version tags ──────────────────────────────────
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## CrossForge ${{ github.ref_name }}

            ### Installation

            **macOS (Apple Silicon):** Download `CrossForge_*_aarch64.dmg`, open it, and drag CrossForge to Applications.
            **Windows:** Download `CrossForge_*_x64-setup.exe` and run it.
            **Linux:** Download the `.AppImage` file, make it executable, and run it.

            On first launch, CrossForge will automatically download the AI model (~2 GB) and set up AI agents.
            No other software required.

            ### System Requirements
            - 8 GB RAM minimum (16 GB recommended for AI features)
            - 5 GB free disk space
            - Internet connection for first-run model download
